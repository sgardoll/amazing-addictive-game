name: Flutter All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']   # release trigger

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo $ANDROID_KEYSTORE_BASE64 | base64 -d > android/app/upload-keystore.jks
          fi

      - name: Build Android App Bundle
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ADMOB_ANDROID_APP_ID: ${{ secrets.ADMOB_ANDROID_APP_ID }}
        run: flutter build appbundle --release --dart-define=REVENUECAT_GOOGLE_API_KEY=${{ secrets.REVENUECAT_GOOGLE_API_KEY }} --dart-define=ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      # iOS (unsigned release app bundle for artifacting)
      - name: Build iOS App
        env:
          GAD_APP_ID: ${{ secrets.ADMOB_IOS_APP_ID }}
        run: flutter build ios --release --no-codesign --dart-define=REVENUECAT_APPLE_API_KEY=${{ secrets.REVENUECAT_APPLE_API_KEY }} --dart-define=IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
      - run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app ios-runner-app.zip

      # macOS
      - name: Build macOS App
        env:
          REVENUECAT_APPLE_API_KEY: ${{ secrets.REVENUECAT_APPLE_API_KEY }}
        run: flutter build macos --dart-define=REVENUECAT_APPLE_API_KEY="$REVENUECAT_APPLE_API_KEY"
      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app macos-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios-runner-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: macos-app.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, apple]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/android-aab/app-release.aab
            dist/ios-app/ios-runner-app.zip
            dist/macos-app/macos-app.zip
