on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK and AppBundle
        run: |
          flutter build apk --release --dart-define-from-file=.env
          flutter build appbundle --release --dart-define-from-file=.env
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build iOS unsigned app
        run: flutter build ios --release --no-codesign --dart-define-from-file=.env
      - name: Package iOS app
        run: tar -czf Runner-ios.tar.gz -C build/ios/iphoneos Runner.app
      - name: Build macOS app
        run: flutter build macos --release --dart-define-from-file=.env
      - name: Package macOS app
        run: tar -czf Runner-macos.tar.gz -C build/macos/Build/Products/Release Runner.app
      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v3
        with:
          name: apple-artifacts
          path: |
            Runner-ios.tar.gz
            Runner-macos.tar.gz

  test-and-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run tests and web build
        run: |
          flutter test
          flutter build web --release
      - uses: actions/upload-artifact@v3
        with:
          name: test-web-artifacts
          path: build/web

  release:
    runs-on: ubuntu-latest
    needs: [android, apple, test-and-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: dist/android
      - name: Download Apple artifacts
        uses: actions/download-artifact@v4
        with:
          name: apple-artifacts
          path: dist/apple
      - name: Download Test & Web artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-web-artifacts
          path: dist/web
      - name: List release artifacts
        run: ls -R dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/android/**
            dist/apple/**
            dist/web/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
