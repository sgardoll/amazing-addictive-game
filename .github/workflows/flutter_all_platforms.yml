name: Flutter All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']   # release trigger
  pull_request:

jobs:
  test-and-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
      - run: flutter build web

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      # iOS (unsigned release app bundle for artifacting)
      - run: flutter build ios --release --no-codesign
      - run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app ios-runner-app.zip

      # macOS
      - run: flutter build macos
      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app macos-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios-runner-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: macos-app.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-and-web, android, apple]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/android-apk/app-release.apk
            dist/ios-app/ios-runner-app.zip
            dist/macos-app/macos-app.zip
