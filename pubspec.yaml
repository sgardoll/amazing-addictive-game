name: mindsort
description: "A mindful emotion sorting puzzle game"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Persistence
  shared_preferences: ^2.3.5

  
  # IAP
  purchases_flutter: ^8.4.0
  google_mobile_ads: ^5.0.0
  
  # UI/Animations
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  google_fonts: ^6.2.1
  
  # Audio
  audioplayers: ^6.1.0
  
  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.9.0


flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/images/emotions/
